<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Application Received • The Five Rings</title>
  <script>
    const saved = localStorage.getItem('theme') ||
                  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', saved);
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="/styles.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet"/>
</head>
<body class="bg-[var(--bg-primary)] text-[var(--text-primary)] flex flex-col min-h-screen">
  <div id="navbar-placeholder"></div>

  <main class="flex-1">
    <section class="pt-32 pb-32">
      <div class="max-w-3xl mx-auto px-6 text-center">
        <div class="bg-[var(--bg-secondary)] rounded-3xl p-12 border border-[var(--border)]">
          <h1 class="text-5xl font-bold text-[var(--accent)] mb-6">Application Received</h1>
          <p class="text-xl text-[var(--text-secondary)] leading-relaxed mb-8">
            Your entry request has been recorded.
          </p>
          <p class="text-lg text-[var(--text-secondary)] leading-relaxed mb-10">
            Thank you for your interest in The Five Rings. Your submission is now part of the VMSS intake archive.
          </p>
          <a href="/index.html" class="inline-block bg-[var(--accent)] hover:bg-amber-700 text-black font-bold px-10 py-4 rounded-2xl transition">
            Return Home
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="/script.js"></script>
  <div id="footer-placeholder"></div>
</body>
</html>
